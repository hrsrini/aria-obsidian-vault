# GraphRAG 3.x settings for ARIA Banking Compliance Intelligence
# Entity extraction uses OpenAI. Answer generation uses Anthropic (see api/).

models:
  default_chat_model:
    api_key: ${OPENAI_API_KEY}
    type: openai_chat
    model: gpt-4.1-mini
    max_tokens: 4000
    temperature: 0.0
    request_timeout: 180.0

  default_embedding_model:
    api_key: ${OPENAI_API_KEY}
    type: openai_embedding
    model: text-embedding-3-small
    max_tokens: 8191

input:
  type: file
  file_type: text
  base_dir: ../obsidian-vault
  file_pattern: ".*\\.md$"
  encoding: utf-8

chunks:
  size: 600
  overlap: 100
  group_by_columns: [id]

entity_extraction:
  entity_types:
    - Regulation
    - Statute
    - Guidance
    - RiskCategory
    - RiskProgram
    - Role
    - Threshold
    - Framework
    - Definition
    - Regulator
  max_gleanings: 2

relationship_extraction:
  relationship_types:
    - SUPERSEDES
    - MODIFIES
    - APPLIES_TO
    - THRESHOLD_FOR
    - REQUIRES
    - GOVERNS
    - REFERENCES
    - DEFINES
    - IMPLEMENTED_BY
    - EFFECTIVE_FROM
  max_gleanings: 2

community_reports:
  enabled: true
  max_length: 2000
  max_input_length: 8000

storage:
  type: file
  base_dir: ./output

reporting:
  type: file
  base_dir: ./logs

cache:
  type: file
  base_dir: ./cache

skip_workflows: []
